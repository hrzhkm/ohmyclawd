name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  daemon-binary:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: daemon
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: daemon/go.mod
          cache: false

      - name: test before release
        run: go test -race -count=1 ./...

      - name: build linux/amd64
        env:
          GOOS: linux
          GOARCH: amd64
          CGO_ENABLED: 0
        run: |
          go build -trimpath \
            -ldflags="-s -w -X main.version=${GITHUB_REF_NAME}" \
            -o ../ohmyclawd-daemon-linux-amd64 .

      - uses: actions/upload-artifact@v4
        with:
          name: ohmyclawd-daemon-linux-amd64
          path: ohmyclawd-daemon-linux-amd64

  firmware:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: pio-${{ hashFiles('platformio.ini') }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: install platformio
        run: pip install platformio

      - name: build firmware
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i "s/-DVERSION=\\\\\"0.1.0\\\\\"/-DVERSION=\\\\\"${VERSION}\\\\\"/" platformio.ini
          pio run -e cyd
          cp .pio/build/cyd/firmware.bin ohmyclawd-firmware.bin

      - uses: actions/upload-artifact@v4
        with:
          name: ohmyclawd-firmware
          path: ohmyclawd-firmware.bin

  publish:
    needs: [daemon-binary, firmware]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: ohmyclawd-daemon-linux-amd64

      - uses: actions/download-artifact@v4
        with:
          name: ohmyclawd-firmware

      - name: create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "ohmyclawd ${GITHUB_REF_NAME}" \
            --generate-notes \
            ohmyclawd-daemon-linux-amd64 \
            ohmyclawd-firmware.bin
