name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  daemon-binary:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: daemon
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: daemon/go.mod
          cache: false

      - name: test before release
        run: go test -race -count=1 ./...

      - name: build linux/amd64
        env:
          GOOS: linux
          GOARCH: amd64
          CGO_ENABLED: 0
        run: |
          go build -trimpath \
            -ldflags="-s -w -X main.version=${GITHUB_REF_NAME}" \
            -o ../ohmyclawd-daemon-linux-amd64 .

      - uses: actions/upload-artifact@v4
        with:
          name: ohmyclawd-daemon-linux-amd64
          path: ohmyclawd-daemon-linux-amd64

  publish:
    needs: [daemon-binary]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: ohmyclawd-daemon-linux-amd64

      - name: create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "ohmyclawd ${GITHUB_REF_NAME}" \
            --generate-notes \
            ohmyclawd-daemon-linux-amd64
