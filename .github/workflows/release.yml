name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  daemon-binary:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
          - goos: darwin
            goarch: amd64
            suffix: darwin-amd64
          - goos: darwin
            goarch: arm64
            suffix: darwin-arm64
          - goos: windows
            goarch: amd64
            suffix: windows-amd64.exe
    defaults:
      run:
        working-directory: daemon
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: daemon/go.mod
          cache: false

      - name: test
        if: matrix.goos == 'linux'
        run: go test -race -count=1 ./...

      - name: build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          go build -trimpath \
            -ldflags="-s -w -X main.version=${GITHUB_REF_NAME}" \
            -o ../ohmyclawd-daemon-${{ matrix.suffix }} .

      - uses: actions/upload-artifact@v7
        with:
          name: ohmyclawd-daemon-${{ matrix.suffix }}
          path: ohmyclawd-daemon-${{ matrix.suffix }}

  firmware:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/cache@v5
        with:
          path: ~/.platformio
          key: pio-${{ hashFiles('platformio.ini') }}

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: install platformio
        run: pip install platformio

      - name: build firmware
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i "s/-DVERSION=\\\\\"0.1.0\\\\\"/-DVERSION=\\\\\"${VERSION}\\\\\"/" platformio.ini
          pio run -e cyd
          cp .pio/build/cyd/firmware.bin ohmyclawd-firmware.bin

      - name: build merged bin for web flasher
        run: |
          pip install esptool
          VERSION="${GITHUB_REF_NAME#v}"
          esptool.py --chip esp32 merge-bin \
            -o ohmyclawd-cyd-merged.bin \
            --flash-mode dio --flash-freq 40m --flash-size 4MB \
            0x1000 .pio/build/cyd/bootloader.bin \
            0x8000 .pio/build/cyd/partitions.bin \
            0x10000 .pio/build/cyd/firmware.bin

      - uses: actions/upload-artifact@v7
        with:
          name: ohmyclawd-firmware
          path: |
            ohmyclawd-firmware.bin
            ohmyclawd-cyd-merged.bin

  publish:
    needs: [daemon-binary, firmware]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          merge-multiple: true

      - name: update web flasher
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cp ohmyclawd-cyd-merged.bin docs/firmware/ohmyclawd-cyd.bin
          cat > docs/manifest.json << EOF
          {
            "name": "OhMyClawd",
            "version": "${VERSION}",
            "new_install_prompt_erase": true,
            "builds": [
              {
                "chipFamily": "ESP32",
                "parts": [{ "path": "firmware/ohmyclawd-cyd.bin", "offset": 0 }]
              }
            ]
          }
          EOF

      - name: commit flasher update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --cached --quiet || git commit -m "chore: update web flasher to ${GITHUB_REF_NAME}"
          git push origin HEAD:master

      - name: create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_MSG=$(git tag -l --format='%(contents)' "${GITHUB_REF_NAME}" | sed '/-----BEGIN \(SSH\|PGP\) SIGNATURE-----/,$d' | head -20)
          gh release create "${GITHUB_REF_NAME}" \
            --title "ohmyclawd ${GITHUB_REF_NAME}" \
            --notes "${TAG_MSG}" \
            ohmyclawd-daemon-linux-amd64 \
            ohmyclawd-daemon-darwin-amd64 \
            ohmyclawd-daemon-darwin-arm64 \
            ohmyclawd-daemon-windows-amd64.exe \
            ohmyclawd-firmware.bin \
            ohmyclawd-cyd-merged.bin
